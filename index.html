<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#fb7185"><meta name="description" content="ระบบบันทึกการเคลมประกันนักเรียน">
  <link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>ระบบเคลมประกันนักเรียน</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="./config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{kanit:['Kanit','sans-serif']},boxShadow:{soft:'0 12px 35px rgba(51,65,85,.10)',glow:'0 12px 35px rgba(244,114,182,.25)'}}}}</script>
  <style>
    *{font-family:Kanit,sans-serif;box-sizing:border-box}html,body{height:100%;margin:0}body{background:#fff7fa}
    .mesh{background-color:#fff7fa;background-image:radial-gradient(at 15% 15%,#fecdd3aa 0,transparent 32%),radial-gradient(at 85% 8%,#ddd6feaa 0,transparent 30%),radial-gradient(at 70% 82%,#bae6fdaa 0,transparent 30%)}
    .glass{background:rgba(255,255,255,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .rise{animation:rise .35s cubic-bezier(.2,.8,.2,1)}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .pulse-ring{animation:ring 1.6s infinite}@keyframes ring{0%{box-shadow:0 0 0 0 #34d39988}70%{box-shadow:0 0 0 7px #34d39900}100%{box-shadow:0 0 0 0 #34d39900}}
    .card{transition:transform .22s,box-shadow .22s}.card:hover{transform:translateY(-3px);box-shadow:0 16px 40px #47556920}.card:active{transform:scale(.98)}
    .skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#fff 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}@keyframes shimmer{to{background-position:-200% 0}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9px}
    button:disabled{opacity:.55;pointer-events:none}.safe-bottom{padding-bottom:calc(5rem + env(safe-area-inset-bottom))}
  </style>
</head>
<body class="h-full text-slate-800">
<div class="mesh min-h-full safe-bottom">
  <header class="sticky top-0 z-30 glass border-b border-white/70">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-rose-400 to-violet-500 shadow-glow text-white grid place-items-center"><i data-lucide="shield-check"></i></div>
      <div class="min-w-0 flex-1"><h1 id="schoolName" class="font-bold truncate"></h1><p class="text-xs text-slate-500">ระบบบันทึกการเคลมประกันนักเรียน</p></div>
      <div id="connection" class="flex items-center gap-2 text-[11px] bg-white/80 border px-2.5 py-1.5 rounded-full"><span class="w-2 h-2 rounded-full bg-amber-400"></span><span>กำลังเชื่อมต่อ</span></div>
      <button onclick="openManage()" class="w-10 h-10 bg-white border rounded-xl grid place-items-center card" aria-label="ตั้งค่า"><i data-lucide="settings" class="w-5"></i></button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-4">
    <div id="setupWarning" class="hidden mb-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-2xl p-4 text-sm"><b>ยังไม่ได้เชื่อม Google Sheets</b><p class="text-xs mt-1">กรุณาแก้ไข API_URL และ APP_KEY ในไฟล์ config.js ตามคู่มือติดตั้ง</p></div>
    <section id="summaryPage" class="rise">
      <div class="glass rounded-2xl border border-white p-3 shadow-soft mb-4 flex items-end gap-3"><label class="flex-1 text-xs text-slate-500">ปีการศึกษา<select id="year" onchange="state.year=+this.value;renderSummary()" class="block w-full mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-rose-300"></select></label><button onclick="sync(true)" class="w-11 h-11 bg-white border rounded-xl grid place-items-center card" aria-label="รีเฟรช"><i id="refreshIcon" data-lucide="refresh-cw" class="w-4"></i></button></div>
      <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-3"></div>
      <div class="mt-6 mb-3 flex items-center justify-between"><h2 class="font-semibold flex gap-2 items-center"><i data-lucide="layers-3" class="w-4 text-rose-500"></i>สรุปตามชั้นเรียน</h2><small id="lastSync" class="text-slate-400"></small></div>
      <div id="gradeSummary" class="grid md:grid-cols-2 gap-2"></div>
    </section>
    <section id="pendingPage" class="hidden rise"><div class="flex items-center justify-between mb-3"><h2 class="font-semibold">รายการรอดำเนินการ</h2><span id="pendingCount" class="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full"></span></div><div id="pendingList" class="space-y-2"></div></section>
    <section id="recordPage" class="hidden rise"><h2 class="font-semibold mb-3">เลือกชั้นเรียน</h2><div id="gradeButtons" class="grid grid-cols-3 md:grid-cols-9 gap-2"></div><div id="studentArea" class="hidden mt-5"><div class="flex justify-between"><h3 id="gradeTitle" class="font-semibold"></h3><button onclick="state.grade=null;renderRecord()" class="text-sm text-slate-400">ปิด</button></div><div class="relative my-3"><i data-lucide="search" class="absolute left-3 top-3 w-4 text-slate-400"></i><input id="search" oninput="renderStudents()" placeholder="ค้นหาชื่อนักเรียน..." class="w-full bg-white border rounded-xl pl-10 pr-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-300"></div><div id="studentList" class="space-y-2"></div></div></section>
  </main>
</div>

<nav class="fixed bottom-0 inset-x-0 z-30 glass border-t border-white/80 shadow-[0_-8px_25px_rgba(15,23,42,.08)]" style="padding-bottom:env(safe-area-inset-bottom)"><div class="max-w-4xl mx-auto flex"><button data-tab="summary" class="tab flex-1 py-2.5 text-rose-500"><i data-lucide="layout-dashboard" class="mx-auto w-5"></i><small>สรุป</small></button><button data-tab="pending" class="tab flex-1 py-2.5 text-slate-400 relative"><i data-lucide="clock-3" class="mx-auto w-5"></i><small>ดำเนินการ</small><b id="badge" class="hidden absolute top-1 right-[31%] bg-rose-500 text-white text-[9px] min-w-5 h-5 px-1 rounded-full grid place-items-center"></b></button><button data-tab="record" class="tab flex-1 py-2.5 text-slate-400"><i data-lucide="file-plus-2" class="mx-auto w-5"></i><small>บันทึก</small></button></div></nav>

<div id="modal" class="hidden fixed inset-0 z-40 bg-slate-900/45 p-3 items-end sm:items-center justify-center" style="backdrop-filter:blur(8px)"><div class="bg-white rounded-t-3xl sm:rounded-3xl w-full max-w-lg max-h-[90vh] overflow-auto shadow-2xl rise"><div class="sticky top-0 z-10 bg-white/95 border-b px-5 py-4 flex justify-between" style="backdrop-filter:blur(12px)"><h3 id="modalTitle" class="font-bold"></h3><button onclick="closeModal()" class="w-8 h-8 bg-slate-100 rounded-full">×</button></div><div id="modalBody" class="p-5"></div></div></div>
<div id="installPopup" class="hidden fixed inset-0 z-[60] bg-slate-900/50 p-4 items-center justify-center" style="backdrop-filter:blur(8px)"><div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl rise text-center"><div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-rose-400 to-violet-500 text-white grid place-items-center shadow-glow"><i data-lucide="download" class="w-8 h-8"></i></div><h3 class="font-bold text-lg mt-4">ติดตั้งแอปบนอุปกรณ์</h3><p class="text-sm text-slate-500 mt-2">ติดตั้งระบบเคลมประกันเพื่อเข้าใช้งานได้สะดวกจากหน้าจอหลัก</p><div class="grid grid-cols-2 gap-2 mt-6"><button onclick="closeInstallPopup()" class="border rounded-xl py-3 text-slate-600">ไว้ภายหลัง</button><button onclick="installApp()" class="bg-gradient-to-r from-rose-500 to-violet-500 text-white rounded-xl py-3 font-medium">ติดตั้งแอป</button></div></div></div>
<div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white rounded-xl px-4 py-2.5 text-sm shadow-2xl rise max-w-[90%]"></div>

<script>
const CFG=window.APP_CONFIG||{},GRADES=['อ.1','อ.2','อ.3','ป.1','ป.2','ป.3','ป.4','ป.5','ป.6'];
const state={students:[],claims:[],tab:'summary',year:null,grade:null,version:0,syncing:false,lastSync:null};
const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])),arg=s=>encodeURIComponent(String(s??''));
const money=n=>'฿'+Number(n||0).toLocaleString('th-TH'),today=()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`},ay=v=>{const d=new Date(v+'T00:00:00');return d.getFullYear()-(d.getMonth()<4?1:0)};
const claimsYear=()=>state.claims.filter(c=>c.claimDate&&ay(c.claimDate)===state.year),studentClaims=s=>state.claims.filter(c=>c.studentId===s.id);
const icons=()=>window.lucide?.createIcons();
class API {
  constructor(){this.url=CFG.API_URL||'';this.key=CFG.APP_KEY||''}
  configured(){return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(this.url)}
  async get(action){
    if(!this.configured())throw new Error('ยังไม่ได้ตั้งค่า API_URL');
    const url=new URL(this.url);url.searchParams.set('action',action);url.searchParams.set('key',this.key);url.searchParams.set('_',Date.now());
    try{const r=await fetch(url,{cache:'no-store',redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();if(!d.ok)throw new Error(d.error);return d}
    catch(e){return this.jsonp(url)}
  }
  jsonp(url){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999),s=document.createElement('script'),timer=setTimeout(()=>done(new Error('หมดเวลาการเชื่อมต่อ')),15000);function done(err,data){clearTimeout(timer);delete window[cb];s.remove();err?reject(err):resolve(data)}window[cb]=d=>d.ok?done(null,d):done(new Error(d.error));url.searchParams.set('callback',cb);s.src=url; s.onerror=()=>done(new Error('เชื่อมต่อ API ไม่สำเร็จ'));document.head.appendChild(s)})}
  async post(action,payload={}){
    if(!this.configured())throw new Error('ยังไม่ได้ตั้งค่า API_URL');
    const body=new URLSearchParams({action,key:this.key,payload:JSON.stringify(payload)});
    const r=await fetch(this.url,{method:'POST',body,redirect:'follow'});if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();if(!d.ok)throw new Error(d.error);return d
  }
}
const api=new API();
function cacheSave(){localStorage.setItem('claim_cache_v3',JSON.stringify({students:state.students,claims:state.claims,version:state.version,at:Date.now()}))}
function cacheLoad(){try{const c=JSON.parse(localStorage.getItem('claim_cache_v3')||'null');if(c){state.students=c.students||[];state.claims=c.claims||[];state.version=c.version||0;renderAll()}}catch(e){}}
function connection(mode,text){const e=$('#connection'),dot=e.firstElementChild,label=e.lastElementChild;dot.className='w-2 h-2 rounded-full '+(mode==='ok'?'bg-emerald-400 pulse-ring':mode==='bad'?'bg-red-400':'bg-amber-400');label.textContent=text}
function toast(text){const e=$('#toast');e.textContent=text;e.classList.remove('hidden');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.add('hidden'),2600)}
async function sync(force=false){
  if(state.syncing||!api.configured()||!navigator.onLine)return;
  state.syncing=true;$('#refreshIcon')?.classList.add('animate-spin');connection('wait','กำลังซิงก์');
  try{
    const v=await api.get('version');
    if(force||Number(v.version)!==Number(state.version)){
      const d=await api.get('bootstrap');state.students=d.students||[];state.claims=d.claims||[];state.version=Number(d.version||0);cacheSave();renderAll()
    }
    state.lastSync=new Date();connection('ok','เรียลไทม์');renderSyncTime();
  }catch(e){connection('bad','ออฟไลน์');if(force)toast(e.message)}
  finally{state.syncing=false;$('#refreshIcon')?.classList.remove('animate-spin')}
}
function renderSyncTime(){if(state.lastSync)$('#lastSync').textContent='อัปเดต '+state.lastSync.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
async function mutate(action,payload,onOptimistic){
  const snapshot=JSON.stringify({students:state.students,claims:state.claims});
  try{onOptimistic?.();renderAll();connection('wait','กำลังบันทึก');const d=await api.post(action,payload);state.version=Number(d.version||state.version);await sync(true);toast('บันทึกสำเร็จ')}
  catch(e){const old=JSON.parse(snapshot);state.students=old.students;state.claims=old.claims;renderAll();connection('bad','บันทึกไม่สำเร็จ');toast('ไม่สำเร็จ: '+e.message);throw e}
}
function renderYears(){const years=[...new Set([ay(today()),...state.claims.filter(c=>c.claimDate).map(c=>ay(c.claimDate))])].sort((a,b)=>b-a);if(!years.includes(state.year))state.year=years[0];$('#year').innerHTML=years.map(y=>`<option value="${y}" ${y===state.year?'selected':''}>ปีการศึกษา ${y+543}/${y+544}</option>`).join('')}
function renderAll(){renderYears();renderSummary();renderPending();renderRecord();const n=state.claims.filter(c=>c.status==='pending').length;$('#badge').textContent=n;$('#badge').classList.toggle('hidden',!n);renderSyncTime();icons()}
function renderSummary(){
  const cs=claimsYear(),pending=cs.filter(c=>c.status==='pending'),success=cs.filter(c=>c.status==='success');
  const cards=[['students','users-round','นักเรียนทั้งหมด',state.students.length,'from-rose-400 to-pink-500'],['claims','files','รายการเคลม',cs.length,'from-sky-400 to-blue-500'],['pending','clock-3','กำลังรอโอน',pending.length,'from-amber-400 to-orange-500'],['amount','banknote','ยอดเคลมทั้งหมด',money(cs.reduce((a,c)=>a+c.amount,0)),'from-violet-400 to-purple-600']];
  $('#stats').innerHTML=cards.map((x,i)=>`<button onclick="openDetail('${x[0]}')" class="card relative overflow-hidden text-left text-white rounded-2xl p-4 shadow-soft bg-gradient-to-br ${x[4]} rise" style="animation-delay:${i*45}ms"><span class="absolute -right-5 -top-5 w-20 h-20 rounded-full bg-white/15"></span><span class="w-9 h-9 bg-white/20 rounded-xl grid place-items-center mb-4"><i data-lucide="${x[1]}" class="w-5"></i></span><b class="block text-2xl">${x[3]}</b><span class="text-xs text-white/90">${x[2]}</span><span class="float-right text-[10px] mt-1">รายละเอียด ›</span></button>`).join('');
  $('#gradeSummary').innerHTML=GRADES.map(g=>{const gc=cs.filter(c=>c.grade===g),p=gc.filter(c=>c.status==='pending').length,s=gc.filter(c=>c.status==='success').length;return `<button onclick="openGradeDetail('${g}')" class="card glass border border-white rounded-2xl p-3 flex items-center gap-3 text-left shadow-sm"><b class="w-12 h-12 bg-gradient-to-br from-indigo-100 to-purple-100 text-indigo-700 rounded-xl grid place-items-center">${g}</b><span class="flex-1"><b>${state.students.filter(x=>x.grade===g).length} คน</b><small class="block text-slate-400">เคลม ${gc.length} · รอ ${p} · สำเร็จ ${s}</small></span><b class="text-sm">${money(gc.reduce((a,c)=>a+c.amount,0))}</b><i data-lucide="chevron-right" class="w-4 text-slate-300"></i></button>`}).join('');icons()
}
function groupedClaims(list){
  return GRADES.map(g=>[g,list.filter(c=>c.grade===g)]).filter(x=>x[1].length).map(([g,cs])=>`<section class="mb-5"><div class="flex justify-between bg-indigo-50 text-indigo-700 rounded-xl px-3 py-2"><b>ชั้น ${g}</b><small>${cs.length} รายการ · ${money(cs.reduce((a,c)=>a+c.amount,0))}</small></div><div class="divide-y">${cs.sort((a,b)=>b.claimDate.localeCompare(a.claimDate)).map(c=>`<button onclick="openClaimHistory('${arg(c.studentId)}','${arg(c.name)}','${arg(c.grade)}')" class="card w-full py-3 flex text-left gap-2"><span class="flex-1"><b class="text-sm">${esc(c.name)}</b><small class="block text-slate-400">${esc(c.claimDate)} · ${c.status==='success'?'โอนแล้ว':'รอโอน'}</small></span><b>${money(c.amount)}</b></button>`).join('')}</div></section>`).join('')||empty('ไม่มีข้อมูลในปีการศึกษานี้')
}
function empty(t){return `<div class="text-center py-14 text-slate-400"><i data-lucide="inbox" class="w-10 mx-auto mb-2 opacity-40"></i><p class="text-sm">${t}</p></div>`}
function openDetail(type){const cs=claimsYear();if(type==='students'){showModal('นักเรียนทั้งหมด',GRADES.map(g=>`<section class="mb-4"><h4 class="font-bold bg-indigo-50 text-indigo-700 px-3 py-2 rounded-xl">ชั้น ${g} · ${state.students.filter(s=>s.grade===g).length} คน</h4>${state.students.filter(s=>s.grade===g).sort((a,b)=>a.name.localeCompare(b.name,'th')).map(s=>`<button onclick="openClaimHistory('${arg(s.id)}','${arg(s.name)}','${arg(g)}')" class="card w-full text-left py-2.5 border-b text-sm">${esc(s.name)}<i data-lucide="chevron-right" class="float-right w-4 text-slate-300"></i></button>`).join('')||'<p class="text-xs text-slate-400 p-2">ไม่มีนักเรียน</p>'}</section>`).join(''));return}const list=type==='pending'?cs.filter(c=>c.status==='pending'):cs,title=type==='claims'?'รายการเคลมทั้งหมด':type==='pending'?'รายการรอโอน':'ยอดเคลมทั้งหมด '+money(list.reduce((a,c)=>a+c.amount,0));showModal(title,groupedClaims(list))}
function openGradeDetail(g){const cs=claimsYear().filter(c=>c.grade===g);showModal(`รายละเอียดชั้น ${g}`,`<div class="grid grid-cols-3 gap-2 mb-5 text-center"><div class="bg-slate-50 p-3 rounded-xl"><b>${state.students.filter(s=>s.grade===g).length}</b><small class="block">นักเรียน</small></div><div class="bg-amber-50 p-3 rounded-xl"><b>${cs.filter(c=>c.status==='pending').length}</b><small class="block">รอโอน</small></div><div class="bg-green-50 p-3 rounded-xl"><b>${money(cs.reduce((a,c)=>a+c.amount,0))}</b><small class="block">ยอดรวม</small></div></div>${groupedClaims(cs)}`)}
function openClaimHistory(id,name,grade){id=decodeURIComponent(id);name=decodeURIComponent(name);grade=decodeURIComponent(grade);const list=state.claims.filter(c=>c.studentId===id&&c.claimDate&&ay(c.claimDate)===state.year).sort((a,b)=>b.claimDate.localeCompare(a.claimDate));showModal(`${name} · ${grade}`,list.map(c=>`<div class="border rounded-2xl p-3 mb-2"><div class="flex justify-between"><b class="text-lg">${money(c.amount)}</b><span class="text-xs px-2.5 py-1 rounded-full ${c.status==='success'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">${c.status==='success'?'โอนสำเร็จ':'รอโอน'}</span></div><p class="text-xs text-slate-500 mt-2">วันที่เคลม: ${esc(c.claimDate)}${c.transferDate?`<br>วันที่โอน: ${esc(c.transferDate)}`:''}</p></div>`).join('')||empty('ไม่มีประวัติการเคลมในปีนี้'))}
function renderPending(){const list=state.claims.filter(c=>c.status==='pending').sort((a,b)=>b.claimDate.localeCompare(a.claimDate));$('#pendingCount').textContent=list.length+' รายการ';$('#pendingList').innerHTML=list.map(c=>`<div class="card bg-white border rounded-2xl p-3 flex items-center shadow-sm"><span class="w-10 h-10 bg-amber-100 rounded-xl grid place-items-center mr-3"><i data-lucide="clock" class="w-4 text-amber-600"></i></span><span class="flex-1"><b class="text-sm">${esc(c.name)}</b><small class="block text-slate-400">${esc(c.grade)} · ${esc(c.claimDate)} · ${money(c.amount)}</small></span><button onclick="transfer('${c.id}')" class="bg-gradient-to-r from-emerald-500 to-green-500 text-white text-xs rounded-xl px-3 py-2 shadow">ยืนยันโอน</button></div>`).join('')||empty('ไม่มีรายการรอดำเนินการ ✨');icons()}
async function transfer(id){if(!confirm('ยืนยันว่าโอนเงินแล้ว?'))return;const c=state.claims.find(x=>x.id===id);await mutate('transferClaim',{id},()=>{c.status='success';c.transferDate=today()})}
function renderRecord(){$('#gradeButtons').innerHTML=GRADES.map(g=>`<button onclick="state.grade='${g}';renderRecord()" class="card border rounded-xl py-3 ${state.grade===g?'bg-gradient-to-br from-rose-400 to-pink-500 text-white shadow-glow':'bg-white'}">${g}<small class="block opacity-70">${state.students.filter(s=>s.grade===g).length} คน</small></button>`).join('');$('#studentArea').classList.toggle('hidden',!state.grade);if(state.grade){$('#gradeTitle').textContent='ชั้น '+state.grade;renderStudents()}}
function renderStudents(){if(!state.grade)return;const q=$('#search').value.trim().toLowerCase(),list=state.students.filter(s=>s.grade===state.grade&&s.name.toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name,'th'));$('#studentList').innerHTML=list.map(s=>`<div class="card bg-white border rounded-2xl p-3 flex"><span class="flex-1"><b class="text-sm">${esc(s.name)}</b><small class="block text-slate-400">เคลม ${studentClaims(s).length} รายการ</small></span><button onclick="claim('${s.id}')" class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white text-xs rounded-xl px-3">บันทึกเคลม</button></div>`).join('')||empty('ไม่พบรายชื่อ');icons()}
function claim(id){const s=state.students.find(x=>x.id===id);showModal('บันทึกเคลม',`<p class="mb-4 font-medium">${esc(s.name)} <span class="text-slate-400">(${s.grade})</span></p><label class="text-xs text-slate-500">เลือกจำนวนเงิน</label><div class="grid grid-cols-2 gap-2 mt-2"><button onclick="saveClaim('${id}',100)" class="card bg-gradient-to-br from-blue-400 to-blue-600 text-white rounded-2xl py-5 text-xl font-bold">฿100</button><button onclick="saveClaim('${id}',300)" class="card bg-gradient-to-br from-emerald-400 to-emerald-600 text-white rounded-2xl py-5 text-xl font-bold">฿300</button></div><label class="text-xs text-slate-500 block mt-4">หรือระบุจำนวนอื่น</label><div class="flex gap-2 mt-2"><input id="customAmount" type="number" min="1" placeholder="จำนวนเงิน" class="border rounded-xl px-3 w-full"><button onclick="saveClaim('${id}',+$('#customAmount').value)" class="bg-slate-800 text-white rounded-xl px-4">บันทึก</button></div>`)}
async function saveClaim(id,amount){if(!amount||amount<=0)return toast('กรุณากรอกจำนวนเงิน');const s=state.students.find(x=>x.id===id),temp={id:'temp-'+Date.now(),studentId:s.id,name:s.name,grade:s.grade,amount:+amount,status:'pending',claimDate:today(),transferDate:''};closeModal();await mutate('createClaim',{studentId:id,amount:+amount,claimDate:today()},()=>state.claims.push(temp))}
function openManage(){showModal('จัดการนักเรียน',`<div class="bg-slate-50 p-3 rounded-2xl"><input id="newName" placeholder="ชื่อ-นามสกุล" class="border rounded-xl px-3 py-2.5 w-full mb-2"><select id="newGrade" class="border rounded-xl px-3 py-2.5 w-full bg-white">${GRADES.map(g=>`<option>${g}</option>`).join('')}</select><button onclick="addStudent()" class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-xl py-2.5 w-full mt-2">เพิ่มนักเรียน</button></div><label class="border-2 border-dashed rounded-xl p-3 block text-center cursor-pointer mt-4 text-sm">นำเข้า CSV (ชื่อ,ชั้น)<input type="file" accept=".csv" class="hidden" onchange="importCSV(this)"></label><div class="mt-4"><select id="manageGrade" onchange="renderManageNames()" class="border rounded-xl px-3 py-2.5 w-full bg-white"><option value="">ทุกชั้น</option>${GRADES.map(g=>`<option>${g}</option>`).join('')}</select><div class="grid grid-cols-2 gap-2 mt-2"><button onclick="openMoveGrade()" class="bg-sky-600 text-white rounded-xl py-2 text-xs">ย้ายไปชั้นที่กำหนด</button><button onclick="promoteSelected()" class="bg-purple-600 text-white rounded-xl py-2 text-xs">เลื่อนชั้นอัตโนมัติ</button></div></div><div id="manageNames" class="mt-2 max-h-72 overflow-auto"></div>`);renderManageNames()}
function renderManageNames(){const g=$('#manageGrade')?.value||'',e=$('#manageNames');if(!e)return;e.innerHTML=state.students.filter(s=>!g||s.grade===g).sort((a,b)=>a.name.localeCompare(b.name,'th')).map(s=>`<div class="flex py-2.5 border-b text-sm"><span class="flex-1">${esc(s.name)} <small class="text-slate-400">${s.grade}</small></span><button onclick="removeStudent('${s.id}')" class="text-red-500">ลบ</button></div>`).join('')||empty('ไม่มีข้อมูล')}
async function addStudent(){const name=$('#newName').value.trim(),grade=$('#newGrade').value;if(!name)return toast('กรุณากรอกชื่อ');if(state.students.some(s=>s.name===name&&s.grade===grade))return toast('มีรายชื่อนี้แล้ว');const temp={id:'temp-'+Date.now(),name,grade,active:true};$('#newName').value='';await mutate('addStudent',{name,grade},()=>state.students.push(temp));renderManageNames()}
async function removeStudent(id){const s=state.students.find(x=>x.id===id);if(!confirm(`ลบ ${s.name} ออกจากรายชื่อนักเรียน? ประวัติเคลมจะยังคงอยู่`))return;await mutate('deleteStudent',{id},()=>state.students=state.students.filter(x=>x.id!==id));renderManageNames()}
function parseCSV(text){const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(Boolean);return lines.map(line=>{const cols=[];let cur='',quote=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&line[i+1]==='"'){cur+='"';i++}else if(ch==='"')quote=!quote;else if(ch===','&&!quote){cols.push(cur.trim());cur=''}else cur+=ch}cols.push(cur.trim());return{name:cols[0],grade:cols[1]}}).filter(x=>x.name&&GRADES.includes(x.grade))}
async function importCSV(input){if(!input.files[0])return;const rows=parseCSV(await input.files[0].text()).slice(0,500);if(!rows.length)return toast('รูปแบบไฟล์ไม่ถูกต้อง');try{connection('wait','กำลังนำเข้า');const d=await api.post('importStudents',{rows});state.version=Number(d.version||0);await sync(true);renderManageNames();toast(`นำเข้า ${d.result.added} คน · ข้าม ${d.result.skipped} คน`)}catch(e){toast(e.message)}}
async function promoteSelected(){const grade=$('#manageGrade').value;if(!grade)return toast('กรุณาเลือกชั้น');const next=GRADES[GRADES.indexOf(grade)+1]||'';if(!confirm(next?`เลื่อนนักเรียน ${grade} ไป ${next}?`:'ให้นักเรียน ป.6 สำเร็จการศึกษาและนำออกจากรายชื่อ?'))return;try{const d=await api.post('promoteGrade',{grade});state.version=Number(d.version||0);await sync(true);renderManageNames();toast(`ดำเนินการ ${d.result.changed} คนสำเร็จ`)}catch(e){toast(e.message)}}
function openMoveGrade(){const from=$('#manageGrade')?.value;if(!from)return toast('กรุณาเลือกชั้นต้นทาง');showModal('ย้ายชั้นเรียน',`<p class="text-sm mb-3">ย้ายนักเรียนทุกคนจาก <b>${from}</b></p><label class="text-xs text-slate-500">ไปยังชั้น</label><select id="moveToGrade" class="border rounded-xl px-3 py-3 w-full bg-white mt-1">${GRADES.filter(g=>g!==from).map(g=>`<option>${g}</option>`).join('')}</select><div class="grid grid-cols-2 gap-2 mt-5"><button onclick="openManage()" class="border rounded-xl py-3">ย้อนกลับ</button><button onclick="confirmMoveGrade('${from}')" class="bg-sky-600 text-white rounded-xl py-3">ยืนยันการย้าย</button></div>`)}
async function confirmMoveGrade(from){const to=$('#moveToGrade').value;if(!confirm(`ย้ายนักเรียนทั้งหมดจาก ${from} ไป ${to}?`))return;try{const d=await api.post('moveGrade',{fromGrade:from,toGrade:to});state.version=Number(d.version||0);await sync(true);openManage();toast(`ย้ายสำเร็จ ${d.result.changed} คน`)}catch(e){toast(e.message)}}
function showModal(title,body){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=body;$('#modal').classList.remove('hidden');$('#modal').classList.add('flex');icons()}function closeModal(){$('#modal').classList.add('hidden');$('#modal').classList.remove('flex')}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;['summary','pending','record'].forEach(t=>$('#'+t+'Page').classList.toggle('hidden',t!==state.tab));document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('text-rose-500');x.classList.add('text-slate-400')});b.classList.remove('text-slate-400');b.classList.add('text-rose-500');renderAll()});
window.addEventListener('online',()=>sync(true));window.addEventListener('offline',()=>connection('bad','ออฟไลน์'));document.addEventListener('visibilitychange',()=>{if(!document.hidden)sync()});
let deferredInstallPrompt=null;
function isInstalled(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true||localStorage.getItem('claim_app_installed')==='1'}
function closeInstallPopup(){const e=$('#installPopup');e.classList.add('hidden');e.classList.remove('flex')}
async function installApp(){if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();const choice=await deferredInstallPrompt.userChoice;if(choice.outcome==='accepted'){localStorage.setItem('claim_app_installed','1');closeInstallPopup()}deferredInstallPrompt=null}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;if(!isInstalled()){const p=$('#installPopup');p.classList.remove('hidden');p.classList.add('flex');icons()}});
window.addEventListener('appinstalled',()=>{localStorage.setItem('claim_app_installed','1');closeInstallPopup();deferredInstallPrompt=null});
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
$('#schoolName').textContent=CFG.SCHOOL_NAME||'โรงเรียนบ้านโคกประดู่';$('#setupWarning').classList.toggle('hidden',api.configured());cacheLoad();renderAll();sync(true);setInterval(()=>sync(false),Math.max(2500,Number(CFG.SYNC_INTERVAL_MS)||4000));icons();
</script>
</body>
</html>
